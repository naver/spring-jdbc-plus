name: Publish artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Target tag of publish"
        required: true
        default: 'default'
        type: string
  push:
    branches:
      - feature/cw/add-publish-action

jobs:
  publish:
    name: Publish artifacts with Gradle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Validate tag exists
        run: |
          git fetch --all --tags
          if [ -z "$(git tag -l 3.3.1)" ]; then
            echo "Tag ${{ github.event.inputs.tag }} does not exist"
            exit 1
          fi

      - name: Checkout Specific tag
        run: git checkout 3.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish artifacts
        env:
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.OSSRH_USER_NAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.OSSRH_USER_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassphrase: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo $ORG_GRADLE_PROJECT_signingKey
          ./gradlew publish --info
